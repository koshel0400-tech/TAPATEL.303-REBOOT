name: Сборка APK из HTML
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Скачивание кода сайта
        uses: actions/checkout@v3

      - name: Настройка Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Сборка APK файла
        uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: "."       # Точка означает, что index.html лежит прямо в корне
          app-name: "TAPATEL-303"      # Ваше точное имя приложения
          output-folder-path: "my-apks" # Папка, куда робот сохранит результат

      - name: Сохранение готового APK
        uses: actions/upload-artifact@v3
        with:
          name: Final-APK
          path: my-apks/
