name: Сборка APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: "."
          app-name: "MoySait"
      - uses: actions/upload-artifact@v4
        with:
          name: TAPATEL-303-REBOOT
          path: output-apk/

